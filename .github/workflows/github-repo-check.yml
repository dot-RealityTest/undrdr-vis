name: UND-RDR GitHub repo check

on:
  workflow_dispatch:
  schedule:
    - cron: '17 5 * * *'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: undrdr-github-repo-check
  cancel-in-progress: false

jobs:
  check-repos:
    runs-on: ubuntu-latest
    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare update branch
        run: |
          BRANCH="automation/github-repo-snapshot"
          git fetch origin "$BRANCH" || true
          git checkout -B "$BRANCH"

      - name: Update GitHub repo snapshot
        run: npm run check:github:apply -- --delay-ms 350
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate data
        run: npm run validate:data

      - name: Open snapshot update PR
        id: snapshot-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="automation/github-repo-snapshot"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/all_repos.json public/data/update-report.json backups/pre-github-check-*.json

          if git diff --cached --quiet; then
            echo "No GitHub snapshot changes to review."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "Update UND-RDR GitHub repo snapshot"
          git push --force-with-lease origin "$BRANCH"

          if gh pr view "$BRANCH" --json number --jq .number >/tmp/undrdr-pr-number 2>/dev/null; then
            PR_NUMBER="$(cat /tmp/undrdr-pr-number)"
            gh pr comment "$PR_NUMBER" --body "Daily GitHub snapshot refreshed. Please review repo count, crossings, rising projects, and unavailable repos before merging."
          else
            gh pr create \
              --base "${{ github.event.repository.default_branch }}" \
              --head "$BRANCH" \
              --title "Update UND-RDR GitHub repo snapshot" \
              --body "Daily GitHub check refreshed stars, status signals, update report, and a pre-update backup. Review the dataset diff before merging."
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
