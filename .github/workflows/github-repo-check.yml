name: UND-RDR GitHub repo check

on:
  workflow_dispatch:
  # Enable after launch if you want GitHub to update the dataset every day.
  # schedule:
  #   - cron: '17 5 * * *'

permissions:
  contents: write

jobs:
  check-repos:
    runs-on: ubuntu-latest
    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update GitHub repo snapshot
        run: npm run check:github:apply -- --delay-ms 350
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate data
        run: npm run validate:data

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/all_repos.json public/data/update-report.json backups/pre-github-check-*.json
          git diff --cached --quiet || git commit -m "Update UND-RDR GitHub repo snapshot"
          git push
