  <text x="92" y="365" fill="#111312" font-family="Inter, Arial, sans-serif" font-size="88" font-weight="900" letter-spacing="0">repos, found early.</text>
  <text x="96" y="428" fill="#5c635f" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="500">A living discovery index for fresh, rising, near-1K, and graduated open-source projects.</text>
